name: Claude Code Review

# SECURITY: This workflow uses `pull_request_target` so PRs from forks get
# access to the CLAUDE_CODE_OAUTH_TOKEN secret and can mint an OIDC token.
# That means this workflow runs with write permissions on the base repo,
# so it must NEVER execute PR-author-controlled code. Specifically:
#   - Do not `checkout` the PR's head ref (leave `ref:` unset so we get base).
#   - Do not run `npm install`, tests, build scripts, or anything that
#     executes code from the PR tree.
# The Claude review action reads the PR diff via the GitHub API, which is
# the safe path. If you add steps here, preserve this invariant.
on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
